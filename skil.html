<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skill - Ni Putu Laksmi Priya Dewi Dasi</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .skill-list {
            padding-left: 2rem;
            font-size: 1.2rem;
            line-height: 1.8;
            /* Modifikasi bullet menggunakan CSS */
            list-style-type: disc;
            /* Kita bisa ubah dengan square, content, atau ::marker */
        }

        .skill-list li {
            position: relative;
            padding-left: 0.5rem;
            margin-bottom: 0.8rem;
            list-style: none;
            /* Hilangkan default */
        }

        .skill-list li::before {
            content: "✦";
            /* Custom bullet */
            color: var(--accent);
            position: absolute;
            left: -1.5rem;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <nav class="navbar"
        style="width: 100%; display: flex; justify-content: center; gap: 1rem; padding: 1.5rem; background: var(--card-bg); border-bottom: 2px solid var(--card-border); position: sticky; top: 0; z-index: 100; flex-wrap: wrap;">
        <a href="index.html" class="maps-link" style="border-radius: 8px; padding: 0.8rem 1.5rem; font-size: 0.95rem;">⌂
            Home</a>
        <a href="pendidikan.html" class="maps-link"
            style="border-radius: 8px; padding: 0.8rem 1.5rem; font-size: 0.95rem;">🎓 Pendidikan</a>
        <a href="skil.html" class="maps-link" style="border-radius: 8px; padding: 0.8rem 1.5rem; font-size: 0.95rem;">✨
            Skill</a>
        <a href="layout.html" class="maps-link"
            style="border-radius: 8px; padding: 0.8rem 1.5rem; font-size: 0.95rem;">🗂️ Layout</a>
    </nav>
    <header class="header">
        <div class="campus-container" id="campus-badge">
            <h2 class="campus-name">Skill (Kemampuan)</h2>
        </div>
    </header>

    <main class="profile-container">
        <section class="card">
            <div class="profile-info">
                <h1 class="name">Daftar Skill Teknis & Non-Teknis</h1>

                <div class="details" style="grid-template-columns: 1fr; text-align: left;">
                    <div class="detail-item">
                        <ul class="skill-list" style="margin-top: 10px;">
                            <li>Penari</li>
                            <li>Model</li>
                            <li>Foto Model</li>
                            <li>Atlet Lompat Tinggi</li>
                            <li>Pingpong</li>
                            <li>Melukis</li>
                        </ul>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
